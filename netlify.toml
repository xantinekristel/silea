# Netlify build configuration for SILEA
# Connect this repo in the Netlify dashboard (New site from Git) and it will
# use the settings below automatically — no manual build config needed.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page-app fallback so client-side routing / refresh works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
